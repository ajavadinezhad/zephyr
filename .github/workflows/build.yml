name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required for creating releases

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'        # or 1.26.x
          cache: true

      - name: Build for Linux
        run: go build -o zyrln-linux-amd64 ./platforms/desktop/

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: zyrln-linux-amd64
          path: zyrln-linux-amd64
          if-no-files-found: error

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o zyrln-windows-amd64.exe ./platforms/desktop/

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: zyrln-windows-amd64
          path: zyrln-windows-amd64.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # ← Important fix

      - name: List downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/zyrln-linux-amd64
            artifacts/zyrln-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}